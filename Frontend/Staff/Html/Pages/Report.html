<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../Css/StaffDashboard.css">

<style>
   /* =============================================
   REPORT DASHBOARD (STAFF VIEW) - DETAILED CSS
   White & Dark Maroon Theme | For .dashboard-content
   Responsive Cards, Buttons, Date Pickers
   ============================================= */

/* ---------- DASHBOARD CONTENT BASE (override if needed) ---------- */
.dashboard-content {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #fefcf8 0%, #f8f5f2 100%);
    min-height: 100vh;
    padding: 2rem;
    color: #1e293b;
}

/* ---------- NAVBAR (FILTER BUTTONS + DATE INPUTS) ---------- */
.dashboard-content .navbar {
    background: #ffffff;
    border-radius: 28px;
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 8px 20px rgba(94, 11, 21, 0.08);
    border: 1px solid #ede7e6;
    transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.dashboard-content .navbar:hover {
    box-shadow: 0 12px 28px rgba(94, 11, 21, 0.12);
}

.dashboard-content .navbar button {
    background: #ffffff;
    border: 1.5px solid #d9b4b9;
    padding: 0.6rem 1.2rem;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.85rem;
    color: #5E0B15;
    cursor: pointer;
    transition: all 0.25s ease;
}

.dashboard-content .navbar button:hover {
    background: #7A1C2C;
    border-color: #7A1C2C;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(94, 11, 21, 0.2);
}

.dashboard-content .navbar button:active {
    transform: translateY(1px);
}

.dashboard-content .navbar .btn {
    background: #7A1C2C;
    border-color: #7A1C2C;
    color: white;
}

.dashboard-content .navbar .btn:hover {
    background: #5E0B15;
    transform: translateY(-2px);
}

/* Date inputs */
.dashboard-content .navbar input[type="date"] {
    padding: 0.6rem 1rem;
    border: 1.5px solid #ede7e6;
    border-radius: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    background: #ffffff;
    color: #1e293b;
    transition: all 0.25s ease;
    cursor: pointer;
}

.dashboard-content .navbar input[type="date"]:focus {
    outline: none;
    border-color: #7A1C2C;
    box-shadow: 0 0 0 3px rgba(122, 28, 44, 0.15);
}

/* ============================================
   MAIN CONTAINER (CARD HOLDER)
   ============================================ */
.dashboard-content .container {
    max-width: 1200px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 32px;
    padding: 2rem;
    box-shadow: 0 8px 20px rgba(94, 11, 21, 0.08);
    border: 1px solid #ede7e6;
    transition: all 0.25s ease;
}

.dashboard-content .container:hover {
    box-shadow: 0 12px 28px rgba(94, 11, 21, 0.12);
}

/* Heading */
.dashboard-content .container h2 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #5E0B15;
    margin-bottom: 2rem;
    letter-spacing: -0.3px;
    position: relative;
    display: inline-block;
}

.dashboard-content .container h2::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #7A1C2C, #9E2A3B);
    border-radius: 3px;
}

/* ============================================
   CARDS ROW (SALES, PURCHASES, PROFIT)
   ============================================ */
.dashboard-content .row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.dashboard-content .card {
    flex: 1;
    min-width: 200px;
    background: #fef5f3;
    border-radius: 28px;
    padding: 1.8rem 1.5rem;
    text-align: center;
    transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 1px solid #ede7e6;
    position: relative;
    overflow: hidden;
}

.dashboard-content .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #7A1C2C, #9E2A3B);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
}

.dashboard-content .card:hover::before {
    transform: scaleX(1);
}

.dashboard-content .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 28px rgba(94, 11, 21, 0.12);
    border-color: #d9b4b9;
}

.dashboard-content .card h3 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5E0B15;
    margin-bottom: 0.8rem;
    font-weight: 700;
}

.dashboard-content .card p {
    font-size: 2.2rem;
    font-weight: 800;
    margin: 0;
    line-height: 1.2;
}

/* Individual card value colors */
.dashboard-content .card:first-child p {
    color: #2d6a4f;
}
.dashboard-content .card:nth-child(2) p {
    color: #7A1C2C;
}
.dashboard-content .card:last-child p {
    color: #1e40af;
}

/* Date range display */
#range {
    text-align: center;
    font-size: 0.85rem;
    color: #64748b;
    background: #f8f7f5;
    padding: 0.6rem 1rem;
    border-radius: 40px;
    display: inline-block;
    margin-top: 1rem;
}

/* ============================================
   RESPONSIVE DESIGN
   ============================================ */
@media (max-width: 768px) {
    .dashboard-content {
        padding: 1rem;
    }
    .dashboard-content .navbar {
        padding: 0.8rem 1rem;
        gap: 0.7rem;
    }
    .dashboard-content .navbar button,
    .dashboard-content .navbar input[type="date"] {
        padding: 0.5rem 0.9rem;
        font-size: 0.75rem;
    }
    .dashboard-content .container {
        padding: 1.2rem;
    }
    .dashboard-content .container h2 {
        font-size: 1.5rem;
    }
    .dashboard-content .card {
        min-width: 160px;
        padding: 1.2rem 1rem;
    }
    .dashboard-content .card p {
        font-size: 1.8rem;
    }
}

@media (max-width: 550px) {
    .dashboard-content .navbar {
        flex-direction: column;
        align-items: stretch;
    }
    .dashboard-content .navbar button,
    .dashboard-content .navbar input[type="date"],
    .dashboard-content .navbar .btn {
        width: 100%;
        text-align: center;
    }
    .dashboard-content .row {
        flex-direction: column;
    }
    .dashboard-content .card {
        width: 100%;
    }
    .dashboard-content .card p {
        font-size: 1.6rem;
    }
}

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.dashboard-content .container {
    animation: fadeSlideUp 0.4s ease-out;
}

.dashboard-content .card {
    animation: fadeSlideUp 0.4s ease backwards;
}

.dashboard-content .card:nth-child(1) { animation-delay: 0.05s; }
.dashboard-content .card:nth-child(2) { animation-delay: 0.1s; }
.dashboard-content .card:nth-child(3) { animation-delay: 0.15s; }

/* ============================================
   PRINT STYLES
   ============================================ */
@media print {
    .dashboard-content {
        background: white;
        padding: 0;
    }
    .dashboard-content .navbar {
        display: none;
    }
    .dashboard-content .container {
        box-shadow: none;
        border: 1px solid #ccc;
        padding: 1rem;
    }
    .dashboard-content .card {
        break-inside: avoid;
        background: #f9f9f9;
    }
}

/* ========== END OF REPORT DASHBOARD CSS ========== */ 
</style>


<title>ERP Report Dashboard</title>
 
</head>

<body>

 <div class="main-admin-dashboard">
        
        <!-- Sidebar containing navigation links for admin modules -->
        <div class="side-bar">
            <h1>Admin Dashboard</h1>

           <div class="pages-links">
                <ul>
                    <a href="../StaffDashboard.html"><li>Home</li></a>
                    <a href="./New Sale.html"><li>New Sale</li></a>
                    <a href="./Products.html"><li>Products</li></a>
                    <a href="./Inventory.html"><li>Inventory</li></a>
                    <a href="./Report.html"><li>Report</li></a>

                    

                </ul>
            </div>
        </div>
        
        <!-- Main content area where dynamic data and statistics will be displayed -->
        <div class="dashboard-content">
            
<!-- NAVBAR -->
<div class="navbar">

<button onclick="loadReport('daily')">Daily</button>
<button onclick="loadReport('weekly')">Weekly</button>
<button onclick="loadReport('monthly')">Monthly</button>
<button onclick="loadReport('yearly')">Yearly</button>

<input type="date" id="from">
<input type="date" id="to">

<button class="btn" onclick="customReport()">Custom</button>

</div>

<!-- DASHBOARD -->
<div class="container">

<h2>📊 Report Dashboard</h2>

<div class="row">

<div class="card">
<h3>Sales</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>Purchases</h3>
<p id="purchases">0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">0</p>
</div>

</div>

<p id="range"></p>

</div>
            
        </div>
        
    </div>

<script>

const API = "http://localhost:8000/api/reports";

// =========================
// DEFAULT LOAD
// =========================
window.onload = () => loadReport('daily');

// =========================
// FILTER BY TYPE
// =========================
async function loadReport(type){

    let res = await fetch(`${API}?type=${type}`);
    let data = await res.json();

    show(data);
}

// =========================
// CUSTOM DATE REPORT
// =========================
async function customReport(){

    let from = document.getElementById('from').value;
    let to = document.getElementById('to').value;

    if(!from || !to){
        alert("Select dates first");
        return;
    }

    let res = await fetch(`${API}?from=${from}&to=${to}`);
    let data = await res.json();

    show(data);
}

// =========================
// SHOW DATA
// =========================
function show(data){

    document.getElementById('sales').innerText = data.total_sales;
    document.getElementById('purchases').innerText = data.total_purchases;
    document.getElementById('profit').innerText = data.profit;

    document.getElementById('range').innerText =
        `From: ${data.from} To: ${data.to}`;
}

</script>

</body>
</html>
